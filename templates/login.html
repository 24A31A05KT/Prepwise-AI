{% extends "layouts/auth_base.html" %}

{% block title %}Login{% endblock %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}

<div class="login-container">

    <div class="login-card">

        <h2>Welcome Back 👋</h2>

        <p>Login to continue your interview journey.</p>

        <form method="POST">

            <div class="mb-3">

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Email Address"
                    required>

            </div>

            <div class="mb-4">

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Password"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Login

            </button>

        </form>

        <div class="text-center mt-4">

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </div>

    </div>

</div>

{% endblock %}
